<title>Muzaffar Murtozayev | Portfolio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-blue: #00c3ff;
    --neon-purple: #a855f7;
    --neon-pink: #ec4899;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.1);
    --text-primary: #e8f0ff;
    --text-secondary: #7a8aaa;
  }

  html { scroll-behavior: smooth; }

  body {
    background: #030b1a;
    color: var(--text-primary);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LANGUAGE SWITCHER DROPDOWN ── */
  .lang-switcher {
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .lang-active-btn {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: 1px solid rgba(0,195,255,0.55);
    background: rgba(0,195,255,0.13);
    color: var(--neon-blue);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 0 14px rgba(0,195,255,0.25);
    outline: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: box-shadow 0.2s, transform 0.2s;
    user-select: none;
  }
  .lang-active-btn:hover { transform: translateY(-1px); box-shadow: 0 0 22px rgba(0,195,255,0.38); }
  .lang-arrow {
    font-size: 0.6rem;
    transition: transform 0.25s;
    display: inline-block;
  }
  .lang-switcher.open .lang-arrow { transform: rotate(180deg); }

  .lang-dropdown {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    pointer-events: none;
    transition: max-height 0.32s cubic-bezier(.4,0,.2,1), opacity 0.25s;
  }
  .lang-switcher.open .lang-dropdown {
    max-height: 120px;
    opacity: 1;
    pointer-events: auto;
  }
  .lang-btn {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: 1px solid var(--glass-border);
    background: rgba(4,12,32,0.85);
    color: var(--text-secondary);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background 0.22s, color 0.22s, border-color 0.22s, box-shadow 0.22s, transform 0.18s;
    outline: none;
    text-align: center;
  }
  .lang-btn:hover {
    color: #fff;
    border-color: rgba(0,195,255,0.4);
    background: rgba(0,195,255,0.12);
    transform: translateX(-3px);
    box-shadow: 0 0 14px rgba(0,195,255,0.2);
  }

  .glow-spot {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 { width: 520px; height: 520px; background: rgba(0,70,190,0.25); top: -120px; left: -100px; }
  .glow-2 { width: 420px; height: 420px; background: rgba(80,0,200,0.2);  top: 38%; right: -110px; }
  .glow-3 { width: 360px; height: 360px; background: rgba(0,110,210,0.17); bottom: 8%; left: 12%; }

  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(0,140,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,140,255,0.045) 1px, transparent 1px);
    background-size: 55px 55px;
  }

  .it-icons {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .it-icon {
    position: absolute;
    bottom: -5vh;
    opacity: 0;
    font-size: 1.2rem;
    font-family: monospace;
    animation: floatUp linear infinite;
    user-select: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
    6%   { opacity: 1; }
    88%  { opacity: 0.5; }
    100% { transform: translateY(-115vh) rotate(15deg); opacity: 0; }
  }

  .page { position: relative; z-index: 1; }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px 80px;
  }

  .avatar-wrap {
    position: relative;
    width: 150px; height: 150px;
    margin: 0 auto 28px;
  }
  .avatar-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-blue));
    animation: spin 4s linear infinite;
    z-index: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar-inner {
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: #05102a;
    z-index: 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .avatar-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar-fallback {
    font-size: 2.2rem; font-weight: 700; color: #a0c4ff;
    display: none; align-items: center; justify-content: center;
    width: 100%; height: 100%;
  }

  .hero-name {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 50%, var(--neon-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    line-height: 1.15;
  }
  .hero-sub {
    font-size: 1.05rem;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    margin-bottom: 36px;
  }
  .hero-sub span { color: var(--neon-blue); }

  .btn-neon {
    display: inline-block;
    padding: 14px 36px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    border: none;
    background: transparent;
    position: relative;
    color: #fff;
    text-decoration: none;
    transition: transform 0.25s, box-shadow 0.25s;
    outline: none;
  }
  .btn-neon::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50px; padding: 2px;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }
  .btn-neon::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50px;
    background: linear-gradient(135deg, rgba(0,195,255,0.1), rgba(168,85,247,0.1));
  }
  .btn-neon:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 30px rgba(0,195,255,0.35), 0 0 60px rgba(168,85,247,0.2);
  }

  .scroll-caret {
    margin-top: 50px;
    animation: bounce 2s ease-in-out infinite;
    color: var(--text-secondary);
    font-size: 1.5rem;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }

  .projects {
    padding: 80px 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  .section-title {
    text-align: center;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    margin-bottom: 50px;
  }
  .section-title span {
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .section-title::after {
    content: '';
    display: block; width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
    border-radius: 2px; margin: 12px auto 0;
  }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }

  .project-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(.25,.8,.25,1), box-shadow 0.35s, border-color 0.3s;
  }
  .project-card:hover {
    transform: translateY(-10px) scale(1.01);
    box-shadow: 0 20px 60px rgba(0,195,255,0.15), 0 0 0 1px rgba(0,195,255,0.3);
    border-color: rgba(0,195,255,0.35);
  }
  .card-thumb {
    height: 190px;
    background: linear-gradient(135deg, #030d22 0%, #060f28 50%, #080f32 100%);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-thumb::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(0,195,255,0.2) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 70%, rgba(124,58,237,0.2) 0%, transparent 60%);
  }
  .card-thumb-icon {
    font-size: 3rem;
    position: relative; z-index: 1;
    filter: drop-shadow(0 0 14px rgba(0,195,255,0.7));
  }
  .card-badge {
    position: absolute; top: 14px; right: 14px;
    background: rgba(0,195,255,0.12);
    border: 1px solid rgba(0,195,255,0.4);
    color: var(--neon-blue);
    font-size: 0.7rem; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .card-body { padding: 24px; }
  .card-body h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 10px; }
  .card-body p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.65; margin-bottom: 20px; }

  .btn-card {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px; border-radius: 30px;
    font-size: 0.88rem; font-weight: 600;
    text-decoration: none; color: var(--neon-blue);
    border: 1px solid rgba(0,195,255,0.4);
    background: rgba(0,195,255,0.08);
    transition: background 0.25s, box-shadow 0.25s, transform 0.2s;
  }
  .btn-card:hover {
    background: rgba(0,195,255,0.2);
    box-shadow: 0 0 20px rgba(0,195,255,0.25);
    transform: translateX(3px);
  }
  .btn-card svg { width: 14px; height: 14px; transition: transform 0.2s; }
  .btn-card:hover svg { transform: translateX(3px); }

  footer {
    text-align: center;
    padding: 44px 20px 36px;
    border-top: 1px solid var(--glass-border);
  }
  .footer-socials {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .social-btn {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 11px 24px; border-radius: 50px;
    font-size: 0.9rem; font-weight: 600;
    text-decoration: none; border: 1px solid;
    transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
  }
  .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .social-tg {
    color: #29b6e8;
    border-color: rgba(41,182,232,0.38);
    background: rgba(41,182,232,0.07);
  }
  .social-tg:hover {
    background: rgba(41,182,232,0.18);
    box-shadow: 0 0 26px rgba(41,182,232,0.32);
    transform: translateY(-3px);
  }
  .social-ig {
    color: #e8609a;
    border-color: rgba(232,96,154,0.38);
    background: rgba(232,96,154,0.07);
  }
  .social-ig:hover {
    background: rgba(232,96,154,0.18);
    box-shadow: 0 0 26px rgba(232,96,154,0.32);
    transform: translateY(-3px);
  }
  .footer-copy { font-size: 0.8rem; color: var(--text-secondary); }
  .footer-copy a { color: var(--neon-blue); text-decoration: none; }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background: rgba(2,5,16,0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: rgba(4,12,32,0.93);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    max-width: 520px; width: 100%; padding: 36px;
    position: relative;
    transform: translateY(30px) scale(0.96);
    transition: transform 0.35s cubic-bezier(.25,.8,.25,1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,195,255,0.07);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05);
    color: var(--text-secondary);
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s; line-height: 1;
  }
  .modal-close:hover { background: rgba(236,72,153,0.2); color: var(--neon-pink); }

  .modal-title {
    font-size: 1.4rem; font-weight: 700; margin-bottom: 24px;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .modal-section { margin-bottom: 22px; }
  .modal-section h4 {
    font-size: 0.72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--neon-purple); margin-bottom: 8px;
  }
  .modal-section p, .modal-section a {
    font-size: 0.95rem; color: var(--text-secondary); line-height: 1.7;
  }
  .modal-section a { color: var(--neon-blue); text-decoration: none; display: block; margin-top: 4px; }
  .modal-section a:hover { text-decoration: underline; }
  .modal-divider { height: 1px; background: var(--glass-border); margin: 18px 0; }

  @media (max-width: 480px) {
    .avatar-wrap { width: 120px; height: 120px; }
    .modal { padding: 24px 18px; }
    .modal-title { font-size: 1.2rem; }
    .footer-socials { flex-direction: column; gap: 10px; }
    .lang-switcher { top: 12px; right: 10px; }
    .lang-active-btn, .lang-btn { padding: 5px 12px; font-size: 0.72rem; }
  }
</style>
</head>

  var currentLang = 'uz';
  var allLangs = ['uz', 'ru', 'en'];

  function toggleLangMenu() {
    document.getElementById('langSwitcher').classList.toggle('open');
  }

  function buildDropdown(activeLang) {
    var dropdown = document.getElementById('langDropdown');
    dropdown.innerHTML = '';
    allLangs.forEach(function(lang) {
      if (lang === activeLang) return;
      var btn = document.createElement('button');
      btn.className = 'lang-btn';
      btn.textContent = lang.toUpperCase();
      btn.onclick = function() { setLang(lang); };
      dropdown.appendChild(btn);
    });
  }

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('langLabel').textContent = lang.toUpperCase();
    buildDropdown(lang);

    // Close dropdown
    document.getElementById('langSwitcher').classList.remove('open');

    // Update all translated elements
    var t = i18n[lang];
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.textContent = t[key];
    });

    document.documentElement.lang = lang;
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    var sw = document.getElementById('langSwitcher');
    if (!sw.contains(e.target)) sw.classList.remove('open');
  });

  // Init
  buildDropdown('uz');
  setLang('uz');

  // ── MODAL ──
  var overlay = document.getElementById('modalOverlay');
  document.getElementById('openModal').addEventListener('click', function() {
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  });
  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('closeModal').addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

  // ── FLOATING ICONS ──

  ];

    el.style.left = (Math.random() * 98) + 'vw';
    el.style.fontSize = (0.75 + Math.random() * 0.9) + 'rem';
    el.style.animationDuration = (20 + Math.random() * 25) + 's';
    el.style.animationDelay = (Math.random() * 25) + 's';
    var alpha = (0.1 + Math.random() * 0.18).toFixed(2);
    var c = colors[Math.floor(Math.random() * colors.length)].replace('{a}', alpha);

    el.style.fontFamily = 'monospace';
